<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Performance Report</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="server.css">

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Charts -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>

<body>
    <div id="particles-js"></div>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shield-alt logo-icon"></i>
                <span>App Auditor</span>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="global-app-report.html">
                            <i class="fas fa-chart-bar"></i> Detailed App Summary
                        </a>
                    </li>
                    <li class="active">
                        <a href="global-performance-report.html">
                            <i class="fas fa-bolt"></i> Detailed Performance Summary
                        </a>
                    </li>
                    <li>
                        <a href="server.html">
                            <i class="fas fa-home"></i> Back to Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <i class="fas fa-history"></i> History
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <i class="fas fa-cog"></i> Settings
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <a href="#"><i class="fas fa-question-circle"></i> Help</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                <header class="main-header">
                    <h1>Global Performance Report</h1>
                </header>

                <!-- Report Content Injected Dynamically -->
                <section id="report-container" class="content-area">
                    <!-- The createDetailedPerfReport() function dynamically inserts:
                        - Performance sidebar (gauges & scores)
                        - Core metrics
                        - Culprit section
                        - Audit sections
                        - Network Request Waterfall chart
                        - Advanced diagnostics
                        - Passed audits
                    -->
                </section>

                <!-- Fallback if no data -->
                <div id="no-data-placeholder" class="card" style="display:none; text-align:center; padding:40px; margin:30px;">
                    <i class="fas fa-exclamation-circle" style="font-size:2em; color:#d9534f;"></i>
                    <h3>No Report Available</h3>
                    <p>Run a performance scan from the Dashboard to generate a detailed report.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="client.js"></script>
    
</body>
</html>
