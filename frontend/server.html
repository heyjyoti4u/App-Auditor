<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="server.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shield-alt logo-icon"></i>
                <span>App Auditor</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="global-app-report.html"><i class="fas fa-chart-bar"></i> Detailed App Summary</a></li>
                    <li><a href="global-performance-report.html"><i class="fas fa-chart-line"></i> Detailed Performance</a></li>
                    <li><a href="history.html"><i class="fas fa-history"></i> Scan History</a></li>
                    <li><a href="server.html"><i class="fas fa-tachometer-alt"></i> Back to Dashboard</a></li>
                    <li class="active"><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="content-wrapper">
                <header class="main-header">
                    <h1>Settings</h1>
                </header>

                <section class="content-area">
                    <div class="card">
                        <div class="card-content">
                            <h3 class="section-title">Scan Configuration</h3>
                            <p class="section-description">
                                Control the default parameters for all future scans.
                            </p>
                            
                            <div class="setting-item">
                                <label for="deviceToggle" class="setting-label">Default Scan Device</label>
                                <div class="toggle-switch">
                                    <input type="checkbox" id="deviceToggle" class="settings-toggle-input" checked> 
        
                                    <label for="deviceToggle" class="settings-toggle-label">
                                       <span class="toggle-text toggle-text-left">Mobile</span>
                                       <span class="toggle-text toggle-text-right">Desktop</span>
                                    </label>
                                </div>
                            </div>
                            <div class="setting-item">
                                <label for="heavyHitterInput" class="setting-label">"Heavy Hitter" Threshold</label>
                                <div class="setting-input-group">
                                    <input type="number" id="heavyHitterInput" class="setting-input" value="150">
                                    <span>KB</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="content-area" style="margin-top: 20px;">
                    <div class="card danger-zone">
                        <div class="card-content">
                            <h3 class="section-title danger-title">Data Management</h3>
                            <p class="section-description">
                                Export your data or clear all scan history. This cannot be undone.
                            </p>
                            
                            <div class="setting-item">
                                <label class="setting-label">Export History</label>
                                <button id="exportHistoryBtn" class="secondary-button">
                                    <i class="fas fa-download"></i> Export as JSON
                                </button>
                            </div>

                            <div class="setting-item">
                                <label class="setting-label">Clear History</label>
                                <button id="clearHistorySettingsBtn" class="secondary-button error-button">
                                    <i class="fas fa-trash-alt"></i> Clear All History
                                </button>
                            </div>
                        </div>
                    </div>
                </section>

            </div>
        </main>
    </div>
    
    <script src="client.js"></script>
</body>
</html>
